<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorization Callback - Fukuoka AI News</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 600px; margin: 100px auto; padding: 20px; text-align: center; color: #333; }
        .success { color: #27ae60; font-size: 48px; }
        .code-box { background: #f5f5f5; border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin: 20px 0; word-break: break-all; font-family: monospace; font-size: 14px; }
        .instruction { color: #666; margin-top: 20px; }
    </style>
    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const state = params.get('state');
            const error = params.get('error');

            const codeDisplay = document.getElementById('auth-code');
            const statusDisplay = document.getElementById('status');

            if (error) {
                statusDisplay.innerHTML = '<span style="color:#e74c3c;font-size:48px;">&#10060;</span><h1>Authorization Failed</h1><p>Error: ' + error + '</p>';
            } else if (code) {
                statusDisplay.innerHTML = '<span class="success">&#10004;</span><h1>Authorization Successful!</h1>';
                codeDisplay.innerHTML = '<p><strong>Authorization Code:</strong></p><div class="code-box">' + code + '</div><p class="instruction">Copy this code and send it to OpenClaw via Slack:<br><code>@OpenClaw TikTok認証コード: ' + code + '</code></p>';
            } else {
                statusDisplay.innerHTML = '<h1>Fukuoka AI News</h1><p>TikTok OAuth Callback Endpoint</p>';
            }
        };
    </script>
</head>
<body>
    <div id="status">
        <h1>Processing...</h1>
    </div>
    <div id="auth-code"></div>
    <div class="instruction">
        <p><a href="index.html">Back to Home</a></p>
    </div>
</body>
</html>
